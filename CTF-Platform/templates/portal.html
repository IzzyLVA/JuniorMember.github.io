<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NexusForge Technologies - Employee Login</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }

    .container {
      background: rgba(15, 23, 42, 0.95);
      padding: 40px 50px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      width: 100%;
      max-width: 420px;
      border: 1px solid #334155;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 600;
      color: #22d3ee;
    }

    .logo p {
      color: #94a3b8;
      font-size: 14px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #f1f5f9;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: #1e2937;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      border-color: #22d3ee;
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);
    }

    button {
      width: 100%;
      padding: 14px;
      background: #22d3ee;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #67e8f9;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .success {
      color: #22c55e;
    }

    .error {
      color: #f87171;
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    <h1>NexusForge</h1>
    <p>Technologies</p>
  </div>

  <h2>Employee Login</h2>

  <!-- ✅ CONNECTED TO FLASK -->
  <form method="POST">

    <div class="form-group">
      <label>Username or Email</label>
      <input type="text" name="username" required>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>

    <button type="submit">Sign In</button>

  </form>

  <!-- ✅ Flask response -->
  {% if message %}
    <div class="message 
      {% if 'GRANTED' in message %}success{% else %}error{% endif %}">
      {{ message }}
    </div>
  {% endif %}

  <div class="footer">
    © 2026 NexusForge Technologies • Internal Systems<br>
    Unauthorized access is prohibited
  </div>

</div>

</body>
</html>
