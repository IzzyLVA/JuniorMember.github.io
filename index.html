<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CTF Platform</title>

<style>
body {
    margin: 0;
    background: #050505;
    color: #fff;
    font-family: "Courier New", monospace;
}

/* Container */
.container {
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Centered grid */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, 250px);
    gap: 25px;
    justify-content: center;
}

/* Card */
.card {
    width: 250px;
    height: 150px;
    border: 1px solid #aa0000;
    padding: 20px;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
    background: rgba(255, 0, 0, 0.03);
}

.card:hover {
    box-shadow: 0 0 12px #ff0000;
    transform: scale(1.03);
}

.card.selected {
    border: 2px solid #ff0000;
    box-shadow: 0 0 20px #ff0000;
}

/* Tag */
.tag {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 11px;
    padding: 3px 8px;
    border: 1px solid #ff0000;
    color: #ff0000;
}

/* Text */
.title {
    margin-top: 25px;
    font-size: 18px;
}

.id {
    position: absolute;
    bottom: 10px;
    font-size: 11px;
    color: #777;
}

/* Terminal wrapper (lower + compact) */
.terminal-wrapper {
    margin-top: 200px; /* pushes it further down */
    opacity: 0;
    transform: translateY(30px);
    transition: 0.4s ease;
    pointer-events: none;
    width: 100%;
    max-width: 600px;
}

.terminal-wrapper.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

/* Terminal box */
.terminal {
    border-top: 1px solid #aa0000;
    padding: 25px;
    text-align: center;
}

/* Mission */
.mission-title {
    color: #ff0000;
    font-size: 18px;
    margin-bottom: 8px;
}

/* Button */
.launch-btn {
    margin-top: 15px;
    padding: 10px 25px;
    background: #aa0000;
    border: none;
    color: white;
    cursor: pointer;
    font-family: inherit;
    transition: 0.3s;
}

.launch-btn:hover {
    background: #ff0000;
    box-shadow: 0 0 10px #ff0000;
}

/* Status */
.status {
    position: fixed;
    right: 20px;
    bottom: 15px;
    color: #ff0000;
    font-size: 12px;
}
</style>

</head>
<body>

<div class="container">

    <!-- Cards -->
    <div class="cards">

        <div class="card" onclick="selectCard(this, 'The Portal')">
            <div class="tag">EASY</div>
            <div class="title">The Portal</div>
            <div class="id">ID: WEB_PORTAL</div>
        </div>

        <div class="card" onclick="selectCard(this, 'Session Hijack')">
            <div class="tag">MEDIUM</div>
            <div class="title">Session Hijack</div>
            <div class="id">ID: WEB_COOKIES</div>
        </div>

        <div class="card" onclick="selectCard(this, 'Vault')">
            <div class="tag">EASY</div>
            <div class="title">Vault</div>
            <div class="id">ID: WEB_VAULT</div>
        </div>

    </div>

    <!-- Terminal -->
    <div class="terminal-wrapper" id="terminalWrapper">
        <div class="terminal">
            <div class="mission-title" id="missionTitle"></div>
            <div id="missionDesc"></div>

            <button class="launch-btn" onclick="launch()">
                LAUNCH TERMINAL
            </button>
        </div>
    </div>

</div>

<div class="status" id="status">
    STATUS: IDLE
</div>

<script>
let selectedCard = null;
let selectedChallenge = null;

function selectCard(card, title) {
    // If clicking same card → deselect
    if (selectedCard === card) {
        card.classList.remove('selected');
        selectedCard = null;
        selectedChallenge = null;

        document.getElementById('terminalWrapper').classList.remove('active');
        document.getElementById('status').innerText = "STATUS: IDLE";
        return;
    }

    // Select new card
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');

    selectedCard = card;
    selectedChallenge = title;

    document.getElementById('missionTitle').innerText = "MISSION: " + title;
    document.getElementById('missionDesc').innerText = "Target ready. Awaiting connection...";

    document.getElementById('status').innerText = "STATUS: TARGET_SELECTED";

    document.getElementById('terminalWrapper').classList.add('active');
}

function launch() {
    if (!selectedChallenge) return;

    document.getElementById('status').innerText = "STATUS: CONNECTING...";

    setTimeout(() => {
        document.getElementById('status').innerText = "STATUS: ACCESS_GRANTED";
        alert("Connected to " + selectedChallenge);
    }, 1000);
}
</script>

</body>
</html>
