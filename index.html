<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CTF Platform</title>

<style>
body {
    margin: 0;
    background: #050505;
    color: #fff;
    font-family: "Courier New", monospace;
}

/* Layout */
.container {
    padding: 40px;
}

/* Grid for many challenges */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 25px;
}

/* Card style */
.card {
    height: 150px;
    border: 1px solid #aa0000;
    padding: 20px;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
    background: rgba(255, 0, 0, 0.03);
}

.card:hover {
    box-shadow: 0 0 12px #ff0000;
    transform: scale(1.02);
}

.card.selected {
    border: 2px solid #ff0000;
    box-shadow: 0 0 20px #ff0000;
}

/* Tag */
.tag {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 11px;
    padding: 3px 8px;
    border: 1px solid #ff0000;
    color: #ff0000;
}

/* Text */
.title {
    margin-top: 25px;
    font-size: 18px;
}

.id {
    position: absolute;
    bottom: 10px;
    font-size: 11px;
    color: #777;
}

/* Terminal Section (hidden initially) */
.terminal-wrapper {
    margin-top: 120px;
    opacity: 0;
    transform: translateY(40px);
    transition: 0.5s ease;
    pointer-events: none;
}

.terminal-wrapper.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

/* Terminal box */
.terminal {
    border-top: 1px solid #aa0000;
    padding: 40px;
    text-align: center;
}

/* Mission */
.mission-title {
    color: #ff0000;
    font-size: 22px;
    margin-bottom: 10px;
}

/* Button */
.launch-btn {
    margin-top: 20px;
    padding: 12px 30px;
    background: #aa0000;
    border: none;
    color: white;
    cursor: pointer;
    font-family: inherit;
    transition: 0.3s;
}

.launch-btn:hover {
    background: #ff0000;
    box-shadow: 0 0 12px #ff0000;
}

/* Status */
.status {
    position: fixed;
    right: 20px;
    bottom: 15px;
    color: #ff0000;
    font-size: 12px;
}
</style>

</head>
<body>

<div class="container">

    <!-- Challenge Grid -->
    <div class="cards">

        <div class="card" onclick="selectCard(this, 'The Portal')">
            <div class="tag">EASY</div>
            <div class="title">The Portal</div>
            <div class="id">ID: WEB_PORTAL</div>
        </div>

        <div class="card" onclick="selectCard(this, 'Session Hijack')">
            <div class="tag">MEDIUM</div>
            <div class="title">Session Hijack</div>
            <div class="id">ID: WEB_COOKIES</div>
        </div>

        <div class="card" onclick="selectCard(this, 'Vault')">
            <div class="tag">EASY</div>
            <div class="title">Vault</div>
            <div class="id">ID: WEB_VAULT</div>
        </div>

        <!-- Add more cards here easily -->

    </div>

    <!-- Terminal Section -->
    <div class="terminal-wrapper" id="terminalWrapper">
        <div class="terminal">
            <div class="mission-title" id="missionTitle">MISSION:</div>
            <div id="missionDesc">Select a challenge to begin.</div>

            <button class="launch-btn" onclick="launch()">
                LAUNCH TERMINAL
            </button>
        </div>
    </div>

</div>

<div class="status" id="status">
    STATUS: IDLE
</div>

<script>
let selectedChallenge = null;

function selectCard(card, title) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');

    selectedChallenge = title;

    document.getElementById('missionTitle').innerText = "MISSION: " + title;
    document.getElementById('missionDesc').innerText = "Target ready. Awaiting connection...";

    document.getElementById('status').innerText = "STATUS: TARGET_SELECTED";

    // Show terminal
    document.getElementById('terminalWrapper').classList.add('active');
}

function launch() {
    if (!selectedChallenge) return;

    document.getElementById('status').innerText = "STATUS: CONNECTING...";

    setTimeout(() => {
        document.getElementById('status').innerText = "STATUS: ACCESS_GRANTED";
        alert("Connected to " + selectedChallenge);
    }, 1000);
}
</script>

</body>
</html>
